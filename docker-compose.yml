services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: akillikutuphane-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_SA_PASSWORD}"
    ports:
      - "${SQL_HOST_PORT:-1434}:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - akillikutuphane-network

  web:
    build:
      context: .
      dockerfile: AkilliKutuphane.Web/Dockerfile
    container_name: akillikutuphane-web
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${DB_NAME:-AkilliKutuphaneDb};User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
    networks:
      - akillikutuphane-network

volumes:
  sql_data:

networks:
  akillikutuphane-network:
    driver: bridge
